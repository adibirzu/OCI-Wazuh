name: codeql

"on":
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
