name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test and shell tooling
        run: |
          python -m pip install --requirement requirements-dev.txt
          sudo apt-get update
          sudo apt-get install --yes bats shellcheck
      - run: make bootstrap
      - run: make test
      - run: make shell-test
      - run: make schema-validate
      - run: make lint
      - run: make orm-package
      - run: make security-scan
      - run: make teach-validate
      - run: make dashboards-validate
      - run: make public-pages
