---
- name: Validate Windows Wazuh manager input
  ansible.builtin.assert:
    that:
      - wazuh_manager_ip is defined
      - wazuh_manager_ip | length > 0
    fail_msg: "Set wazuh_manager_ip to the Wazuh manager private address."

- name: Create Wazuh agent staging directory
  ansible.windows.win_file:
    path: "{{ wazuh_windows_workdir }}"
    state: directory

- name: Check Wazuh Windows service
  ansible.windows.win_service_info:
    name: WazuhSvc
  register: wazuh_windows_service
  failed_when: false

- name: Download Wazuh Windows agent MSI
  ansible.windows.win_get_url:
    url: "{{ wazuh_windows_agent_msi }}"
    dest: "{{ wazuh_windows_workdir }}\\wazuh-agent.msi"
  when: wazuh_windows_service.exists is not defined or not wazuh_windows_service.exists

- name: Install Wazuh Windows agent
  ansible.windows.win_package:
    path: "{{ wazuh_windows_workdir }}\\wazuh-agent.msi"
    arguments: >-
      /q
      WAZUH_MANAGER="{{ wazuh_manager_ip }}"
      WAZUH_REGISTRATION_SERVER="{{ wazuh_manager_ip }}"
      WAZUH_AGENT_GROUP="{{ wazuh_agent_group }}"
      WAZUH_AGENT_NAME="{{ wazuh_agent_name | default(inventory_hostname) }}"
    state: present
  register: wazuh_windows_install
  when: wazuh_windows_service.exists is not defined or not wazuh_windows_service.exists

- name: Configure Wazuh manager endpoint
  ansible.windows.win_powershell:
    script: |
      $conf = 'C:\Program Files (x86)\ossec-agent\ossec.conf'
      [xml]$xml = Get-Content -Path $conf
      $root = $xml.ossec_config
      $changed = $false
      $target = '{{ wazuh_manager_ip }}'

      if ($null -eq $root.client) {
        $client = $xml.CreateElement('client')
        [void]$root.AppendChild($client)
        $changed = $true
      } else {
        $client = $root.client
      }

      $serverNodes = @($xml.SelectNodes('//client/server'))
      if ($serverNodes.Count -eq 0) {
        $server = $xml.CreateElement('server')
        [void]$client.AppendChild($server)
        $changed = $true
      } else {
        $server = $serverNodes[0]
      }

      $addressNodes = @($xml.SelectNodes('//client/server/address'))
      if ($addressNodes.Count -eq 0) {
        $address = $xml.CreateElement('address')
        [void]$server.AppendChild($address)
        $addressNodes = @($address)
        $changed = $true
      }

      foreach ($node in $addressNodes) {
        if ($node.InnerText.Trim() -ne $target) {
          $node.InnerText = $target
          $changed = $true
        }
      }

      $enrollmentNodes = @($xml.SelectNodes('//client/enrollment/manager_address'))
      foreach ($node in $enrollmentNodes) {
        if ($node.InnerText.Trim() -ne $target) {
          $node.InnerText = $target
          $changed = $true
        }
      }

      $protocolNodes = @($xml.SelectNodes('//client/server/protocol'))
      if ($protocolNodes.Count -eq 0) {
        $protocol = $xml.CreateElement('protocol')
        [void]$server.AppendChild($protocol)
        $protocolNodes = @($protocol)
        $changed = $true
      }

      foreach ($node in $protocolNodes) {
        if ($node.InnerText.Trim() -ne 'tcp') {
          $node.InnerText = 'tcp'
          $changed = $true
        }
      }

      if ($changed) {
        $xml.Save($conf)
        Write-Output 'changed'
      } else {
        Write-Output 'ok'
      }
  register: wazuh_windows_manager_endpoint
  changed_when: "'changed' in wazuh_windows_manager_endpoint.output"

- name: Configure Windows event channels for Wazuh
  ansible.windows.win_powershell:
    script: |
      $conf = 'C:\Program Files (x86)\ossec-agent\ossec.conf'
      [xml]$xml = Get-Content -Path $conf
      $root = $xml.ossec_config
      $channels = @(
        'Application',
        'Security',
        'System',
        'Microsoft-Windows-Sysmon/Operational'
      )
      $changed = $false
      foreach ($channel in $channels) {
        $exists = $false
        foreach ($localfile in $root.localfile) {
          if ($localfile.location -eq $channel) {
            $exists = $true
            break
          }
        }
        if (-not $exists) {
          $localfile = $xml.CreateElement('localfile')
          $format = $xml.CreateElement('log_format')
          $format.InnerText = 'eventchannel'
          $location = $xml.CreateElement('location')
          $location.InnerText = $channel
          [void]$localfile.AppendChild($format)
          [void]$localfile.AppendChild($location)
          [void]$root.AppendChild($localfile)
          $changed = $true
        }
      }
      if ($changed) {
        $xml.Save($conf)
        Write-Output 'changed'
      } else {
        Write-Output 'ok'
      }
  register: wazuh_windows_eventchannels
  changed_when: "'changed' in wazuh_windows_eventchannels.output"

- name: Restart Wazuh Windows agent after install or config change
  ansible.windows.win_service:
    name: WazuhSvc
    state: restarted
  when: (wazuh_windows_install.changed | default(false)) or wazuh_windows_manager_endpoint.changed or wazuh_windows_eventchannels.changed

- name: Ensure Wazuh Windows agent is running
  ansible.windows.win_service:
    name: WazuhSvc
    start_mode: auto
    state: started
